# =============================================================================
# CONFIGURACION DEL SERVIDOR WEB
# =============================================================================
# Puerto en el que Tomcat embebido escuchara peticiones HTTP.
# El valor 8080 es el estandar de Spring Boot. Cambialo si tienes otra
# aplicacion ocupando este puerto, por ejemplo a 8081 o 9090.
server.port=8080

# Nombre logico de la aplicacion. Spring Boot lo usa en logs y herramientas
# de monitoreo. Tambien sera el nombre que aparece como identificador del
# servicio si en el futuro lo integras con un sistema de microservicios.
spring.application.name=gym-api


# =============================================================================
# CONFIGURACION DE LA BASE DE DATOS - CONEXION
# =============================================================================
# URL de conexion JDBC a MySQL. Se compone de varias partes:
#   jdbc:mysql:           protocolo y driver
#   //localhost:3306      direccion del servidor y puerto de MySQL
#   /gym                  nombre de la base de datos
# Los parametros despues del signo de interrogacion ajustan el comportamiento:
#   createDatabaseIfNotExist=true crea la base si aun no existe
#   useSSL=false desactiva SSL (apropiado solo para desarrollo local)
#   serverTimezone=UTC evita advertencias relacionadas con zonas horarias
#   useUnicode=true y characterEncoding=UTF-8 garantizan soporte de caracteres
#   especiales como acentos y ń
spring.datasource.url=jdbc:mysql://localhost:3306/gym?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8
# Usuario de la base de datos. En desarrollo local suele ser 'root'.
# En produccion debes crear un usuario especifico con permisos limitados.
spring.datasource.username=root

# Contraseńa del usuario. NUNCA subas este archivo a un repositorio publico
# con la contraseńa real de produccion. Para produccion usa variables de
# entorno o perfiles de Spring separados.
spring.datasource.password=root

# Driver JDBC especifico para MySQL. Spring Boot puede detectarlo solo,
# pero declararlo explicitamente hace la configuracion mas clara.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# =============================================================================
# CONFIGURACION DE LA BASE DE DATOS - JPA E HIBERNATE
# =============================================================================
# Estrategia para sincronizar las entidades Java con las tablas de MySQL.
# Valores posibles y sus efectos:
#   create     borra todo y lo crea de cero en cada arranque (destruye datos)
#   create-drop como create, ademas borra al apagar (uso solo en tests)
#   update     ajusta el esquema sin borrar datos existentes (recomendado en dev)
#   validate   solo verifica que coincida, no modifica nada
#   none       no hace nada (recomendado en produccion con Flyway o Liquibase)
spring.jpa.hibernate.ddl-auto=update

# Muestra en consola las consultas SQL que Hibernate ejecuta.
# Muy util en desarrollo para depurar problemas y entender que esta pasando.
# En produccion se desactiva para evitar ruido en los logs.
spring.jpa.show-sql=true

# Formatea el SQL impreso con saltos de linea y sangrias para que sea legible.
# Sin esta opcion, las consultas aparecen en una sola linea kilometrica.
spring.jpa.properties.hibernate.format_sql=true

# Desactiva el patron Open Session In View, que mantiene abierta la conexion
# a la base durante toda la peticion HTTP. Ponerlo en false fuerza a manejar
# explicitamente las relaciones perezosas, lo cual produce codigo mas robusto.
spring.jpa.open-in-view=false


# =============================================================================
# CONFIGURACION DEL ENVIO DE CORREOS (JAVA MAIL SENDER)
# =============================================================================
# Host del servidor SMTP. Ejemplos comunes:
#   smtp.gmail.com    para Gmail
#   smtp.office365.com para Outlook/Office 365
#   sandbox.smtp.mailtrap.io para Mailtrap (servicio de pruebas)
spring.mail.host=smtp.gmail.com

# Puerto SMTP. El 587 es el estandar para SMTP con STARTTLS.
# Otros puertos comunes son el 465 (SMTPS) y el 25 (SMTP sin cifrar).
spring.mail.port=587

# Cuenta de correo desde la que se enviaran los mensajes.
spring.mail.username=dev.nonatosa@gmail.com

# Contraseńa de la cuenta. Para Gmail debe ser una "contraseńa de aplicacion"
# generada desde la configuracion de seguridad de Google, no tu contraseńa real.
spring.mail.password=qwvp uatw bpmg ajma

# Configuracion de envio de correos de la aplicacion
app.mail.from=dev.nonatosa@gmail.com
app.mail.confirmation-base-url=http://localhost:5173/verificar

# Indica que el servidor SMTP requiere autenticacion.
spring.mail.properties.mail.smtp.auth=true

# Activa el cifrado STARTTLS, que protege la comunicacion con el servidor.
spring.mail.properties.mail.smtp.starttls.enable=true


# =============================================================================
# CONFIGURACION DE SPRINGDOC OPENAPI (SWAGGER)
# =============================================================================
# Ruta donde SpringDoc expone la especificacion OpenAPI en formato JSON.
# Es la URL que herramientas externas consumen para generar codigo cliente.
# El valor por defecto es /v3/api-docs y rara vez hay razon para cambiarlo.
springdoc.api-docs.path=/v3/api-docs

# Ruta donde se sirve la interfaz visual interactiva de Swagger UI.
# Con esta configuracion, una vez arranque la aplicacion podras visitar
# http://localhost:8080/swagger-ui.html y veras todos los endpoints.
springdoc.swagger-ui.path=/swagger-ui.html

# Ordena los endpoints en Swagger UI por metodo HTTP (GET, POST, PUT, DELETE).
# Hace mas facil navegar la documentacion cuando hay muchos endpoints.
springdoc.swagger-ui.operationsSorter=method

# Ordena las etiquetas (grupos de endpoints) alfabeticamente.
springdoc.swagger-ui.tagsSorter=alpha